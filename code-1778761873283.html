    function getRank(xp){ let r=RANKS[0]; for(const x of RANKS){if(xp>=x.min)r=x;} return r; }
    function getNextRank(xp){ for(const r of RANKS){if(xp<r.min)return r;} return null; }
    function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function generateQuestion(mode, pool, usedIds=new Set()){
      const available=pool.filter(c=>!usedIds.has(c.id));
      if(available.length<4) return null;
      const correct=available[Math.floor(Math.random()*available.length)];
      const wrong=shuffle(pool.filter(c=>c.id!==correct.id)).slice(0,3);
      const options=shuffle([correct,...wrong]);
      switch(mode){
        case "flags": return{question:"Which country does this flag belong to?",image:FLAG_URL(correct.id),options:options.map(c=>c.name),correct:correct.name,country:correct};
        case "capitals": return{question:`What is the capital of ${correct.name}?`,options:options.map(c=>c.capital),correct:correct.capital,country:correct};
        case "currency": return{question:`What currency does ${correct.name} use?`,options:options.map(c=>c.currency),correct:correct.currency,country:correct};
        case "continent": return{question:`Which continent is ${correct.name} in?`,options:[...new Set(options.map(c=>c.continent))].slice(0,4),correct:correct.continent,country:correct};
        case "language": return{question:`Which country primarily speaks ${correct.languages[0]}?`,options:options.map(c=>c.name),correct:correct.name,country:correct};
        default: return null;
      }
    }

    // ─── UI ATOMS ─────────────────────────────────────────────────────────────────
    function XPFloat({x,y,amount,onDone}){
      useEffect(()=>{const t=setTimeout(onDone,1200);return()=>clearTimeout(t);},[]);
      return <div className="xp-float" style={{left:x,top:y}}>+{amount} XP</div>;
    }

    function Confetti(){
      const pieces=Array.from({length:80},(_,i)=>({id:i,x:Math.random()*100,color:["#F5C842","#4F8EF7","#22C55E","#EC4899","#F97316"][i%5],delay:Math.random()*2,dur:2.5+Math.random()*3,size:8+Math.random()*10}));
      return<>{pieces.map(p=><div key={p.id} className="confetti-piece" style={{left:`${p.x}%`,top:"-20px",backgroundColor:p.color,width:p.size,height:p.size,animationDuration:`${p.dur}s`,animationDelay:`${p.delay}s`,borderRadius:p.id%3===0?"50%":"3px"}}/>)}</>;
    }

    function ProgressRing({percent,size=160,stroke=12,children}){
      const r=(size-stroke)/2,circ=2*Math.PI*r,offset=circ-(percent/100)*circ;
      return(
        <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>
          <svg width={size} height={size} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)", filter:"drop-shadow(0 0 10px rgba(245,200,66,0.3))"}}>
            <circle cx={size/2} cy={size/2} r={r} fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#gg)" strokeWidth={stroke} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} className="progress-ring-circle"/>
            <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#FCD34D"/><stop offset="100%" stopColor="#D97706"/></linearGradient></defs>
          </svg>
          <div style={{position:"relative",zIndex:1}}>{children}</div>
        </div>
      );
    }

    // ─── WORLD MAP SVG RENDERER ───────────────────────────────────────────────────
    function WorldMap({features,pathGen,highlightNumId,answeredState}){
      const paths=useMemo(()=>features.map((f, index)=>{
        try{ return{key: f.id ? String(f.id) : `fallback-${index}`, id:Number(f.id), d:pathGen(f)||"", feature: f}; }catch{ return null; }
      }).filter(Boolean),[features,pathGen]);

      const highlightedFeature = useMemo(() => {
        const p = paths.find(p => p.id === highlightNumId);
        return p ? p.feature : null;
      }, [paths, highlightNumId]);

      const mapTransform = useMemo(() => {
        if (!highlightedFeature || answeredState) return "translate(0px, 0px) scale(1)";
        try {
          const bounds = pathGen.bounds(highlightedFeature);
          if (!bounds || isNaN(bounds[0][0])) return "translate(0px, 0px) scale(1)";
          const [[x0, y0], [x1, y1]] = bounds;
          const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2, w = x1 - x0, h = y1 - y0;
          const scale = Math.max(1.3, Math.min(2.8, 0.4 / Math.max(w / 960, h / 500)));
          const tx = 480 - cx * scale, ty = 250 - cy * scale;
          return `translate(${tx}px, ${ty}px) scale(${scale})`;
        } catch (e) { return "translate(0px, 0px) scale(1)"; }
      }, [highlightedFeature, pathGen, answeredState]);

      return(
        <svg viewBox="0 0 960 500" width="100%" height="100%" style={{display:"block",borderRadius:18}}>
          <rect width="960" height="500" fill="#0A1220"/>
          <g style={{ transform: mapTransform, transition: "transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1)", transformOrigin: "0px 0px" }}>
            {Array.from({length:10},(_,i)=>(
              <line key={i} x1="0" y1={i*55+10} x2="960" y2={i*55+10} stroke="rgba(79,142,247,0.06)" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
            ))}
            {paths.map(p=>{
              const isHL=p.id===highlightNumId, isCorrect=answeredState==="correct"&&isHL, isWrong=answeredState==="wrong"&&isHL;
              let fill=isHL?"#FCD34D":"#142033";
              if(isCorrect) fill="#22C55E";
              if(isWrong) fill="#EF4444";
              const stroke=isHL?"#FEF08A":"#1E2E45";
              return(
                <path key={p.key} d={p.d} fill={fill} stroke={stroke} strokeWidth={isHL?1.5:0.6} vectorEffect="non-scaling-stroke"
                  className={`map-land${isHL&&!answeredState?" highlighted":""}${isCorrect?" correct-reveal":""}${isWrong?" wrong-reveal":""}`}
                />
              );
            })}
          </g>
        </svg>
      );
    }

    // ─── MAP QUEST QUIZ SCREEN ────────────────────────────────────────────────────
    const TOTAL_MAP_QS=10;

    function MapQuizScreen({diffConfig,onComplete,onBack}){
      const [loadState,setLoadState]=useState("loading");
      const [worldFeatures,setWorldFeatures]=useState([]);
      const [pathGen,setPathGen]=useState(null);
      const [questions,setQuestions]=useState([]);
      const [qIndex,setQIndex]=useState(0);
      const [selected,setSelected]=useState(null);
      const [answeredState,setAnsweredState]=useState(null);
      const [score,setScore]=useState(0);
      const [lives,setLives]=useState(3);
      const [streak,setStreak]=useState(0);
      const [timeLeft,setTimeLeft]=useState(diffConfig.time);
      const [answers,setAnswers]=useState([]);
      const [showFact,setShowFact]=useState(false);
      const [xpFloats,setXpFloats]=useState([]);
      const timerRef=useRef(null);

      useEffect(()=>{
        const doLoad=()=>{
          fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
            .then(r=>r.json())
            .then(topo=>{
              const feats=window.topojson.feature(topo,topo.objects.countries).features;
              const proj=d3.geoNaturalEarth1().scale(153).translate([480,250]);
              const gen=d3.geoPath().projection(proj);
              setWorldFeatures(feats);
              setPathGen(()=>gen);
              setLoadState("ready");
            })
            .catch(()=>setLoadState("error"));
        };
        if(window.topojson){doLoad();return;}
      },[]);

      useEffect(()=>{
        if(loadState!=="ready"||!worldFeatures.length) return;
        const presentIds=new Set(worldFeatures.map(f=>Number(f.id)));
        const pool=COUNTRIES.filter(c=>{
          const num=ALPHA2_TO_NUMERIC[c.id];
          return num!==undefined&&presentIds.has(num)&&diffConfig.ids.includes(c.id);
        });
        if(pool.length<4){setLoadState("error");return;}
        const qs=[],used=new Set();
        for(let i=0;i<TOTAL_MAP_QS;i++){
          const avail=pool.filter(c=>!used.has(c.id));
          if(avail.length<4) break;
          const correct=avail[Math.floor(Math.random()*avail.length)];
          used.add(correct.id);
          const wrong=shuffle(pool.filter(c=>c.id!==correct.id)).slice(0,3);
          qs.push({correct,options:shuffle([correct,...wrong])});
        }
        setQuestions(qs);
      },[loadState,worldFeatures]);

      useEffect(()=>{
        if(loadState!=="ready"||!questions.length||answeredState) return;
        if(timeLeft<=0){handleAnswer(null,null);return;}
        timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);
        return()=>clearTimeout(timerRef.current);
      },[timeLeft,answeredState,questions,loadState]);

      const q=questions[qIndex];
      const highlightNumId=q?ALPHA2_TO_NUMERIC[q.correct.id]:null;

      const handleAnswer=useCallback((country,event)=>{
        if(answeredState||!q) return;
        clearTimeout(timerRef.current);
        const isCorrect=country?.id===q.correct.id;
        const newStreak=isCorrect?streak+1:0;
        const timeBonus=timeLeft>diffConfig.time*0.7?50:timeLeft>diffConfig.time*0.4?25:0;
        const streakMult=newStreak>=10?3:newStreak>=5?2:newStreak>=3?1.5:1;
        const xpGained=isCorrect?Math.round((100+timeBonus)*diffConfig.xpMult*streakMult):0;
        setStreak(newStreak);
        setAnsweredState(isCorrect?"correct":"wrong");
        setSelected(country);
        if(isCorrect){
          setScore(s=>s+xpGained);
          if(event){const r=event.currentTarget.getBoundingClientRect();setXpFloats(f=>[...f,{id:Date.now(),x:r.left+r.width/2-30,y:r.top-10,amount:xpGained}]);}
        } else {setLives(l=>l-1);}
        const newAns=[...answers,{country:q.correct,correct:isCorrect,chosen:country}];
        setAnswers(newAns);
        setShowFact(true);
        const nl=isCorrect?lives:lives-1;
        setTimeout(()=>{
          setShowFact(false);
          if(qIndex+1>=questions.length||nl<=0){
            onComplete({score:score+xpGained,answers:newAns,streak:Math.max(streak,newStreak)});
          } else {
            setQIndex(i=>i+1);setSelected(null);setAnsweredState(null);setTimeLeft(diffConfig.time);
          }
        },2500);
      },[answeredState,q,timeLeft,streak,lives,score,answers,qIndex,questions,diffConfig]);

      const timerPct=(timeLeft/diffConfig.time)*100;
      const timerDanger=timeLeft<=Math.floor(diffConfig.time*0.33);

      if(loadState==="loading") return(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"80vh",gap:20}}>
          <div style={{fontSize:64,animation:"rotate 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite"}}>🌍</div>
          <div className="sora" style={{fontSize:18,color:"#94A3B8",fontWeight:600,letterSpacing:"1px"}}>Loading World Map...</div>
          <div style={{width:160,height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div className="gold-gradient" style={{height:"100%",width:"65%",borderRadius:3,animation:"pulse 1.5s infinite"}}/></div>
        </div>
      );
      if(loadState==="error") return(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"80vh",gap:20,padding:32,textAlign:"center"}}>
          <div style={{fontSize:56}}>😕</div>
          <div className="sora" style={{fontSize:22,fontWeight:800}}>Map couldn't load</div>
          <p style={{color:"#94A3B8",fontSize:16,maxWidth:300}}>Check your connection and try again.</p>
          <button className="btn-gold" style={{padding:"14px 32px",borderRadius:14,fontSize:16,marginTop:10}} onClick={onBack}>Go Back</button>
        </div>
      );
      if(!q) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"80vh"}}><div style={{fontSize:40,animation:"rotate 1s linear infinite"}}>🌍</div></div>;

      return(
        <div className="app-container quiz-container">
          {xpFloats.map(f=><XPFloat key={f.id} x={f.x} y={f.y} amount={f.amount} onDone={()=>setXpFloats(fs=>fs.filter(x=>x.id!==f.id))}/>)}
          
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <button className="btn-ghost" onClick={onBack} style={{padding:"8px 14px",borderRadius:10,fontSize:14}}>✕ Quit</button>
            <div className="sora" style={{fontSize:16,fontWeight:800,color:"#94A3B8",letterSpacing:"1px"}}>

    // ─── STANDARD QUIZ SCREEN ─────────────────────────────────────────────────────
    function QuizScreen({mode,pool,difficulty,onComplete,onBack}){
      const [qIndex,setQIndex]=useState(0);
      const [questions,setQuestions]=useState([]);
      const [selected,setSelected]=useState(null);
      const [answered,setAnswered]=useState(false);
      const [score,setScore]=useState(0);
      const [lives,setLives]=useState(3);
      const [streak,setStreak]=useState(0);
      const [timeLeft,setTimeLeft]=useState(15);
      const [showFact,setShowFact]=useState(false);
      const [xpFloats,setXpFloats]=useState([]);
      const [answers,setAnswers]=useState([]);
      const timerRef=useRef(null);

      useEffect(()=>{const qs=[],used=new Set();for(let i=0;i<10;i++){const q=generateQuestion(mode,pool,used);if(q){qs.push(q);used.add(q.country.id);}}setQuestions(qs);},[]);
      useEffect(()=>{if(!questions.length||answered)return;if(timeLeft<=0){handleAnswer(null,null);return;}timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);return()=>clearTimeout(timerRef.current);},[timeLeft,answered,questions]);
      
      const q=questions[qIndex];
      const diffMult={easy:1,medium:1.5,hard:2}[difficulty]||1;
      
      const handleAnswer=useCallback((option,event)=>{
        if(answered||!q)return;clearTimeout(timerRef.current);setAnswered(true);setSelected(option);
        const isCorrect=option===q.correct,newStreak=isCorrect?streak+1:0;
        const streakMult=newStreak>=10?3:newStreak>=5?2:newStreak>=3?1.5:1;
        const xpGained=isCorrect?Math.round((100+(timeLeft>10?50:timeLeft>5?25:0))*diffMult*streakMult):0;
        setStreak(newStreak);
        if(isCorrect){setScore(s=>s+xpGained);if(event){const r=event.currentTarget.getBoundingClientRect();setXpFloats(f=>[...f,{id:Date.now(),x:r.left+r.width/2-30,y:r.top-10,amount:xpGained}]);}}
        else{setLives(l=>l-1);}
        setAnswers(a=>[...a,{country:q.country,correct:isCorrect,answer:option,correctAnswer:q.correct}]);
        setShowFact(true);
        setTimeout(()=>{
          setShowFact(false);
          const nl=isCorrect?lives:lives-1;
          if(qIndex+1>=questions.length||nl<=0){const fa=[...answers,{country:q.country,correct:isCorrect,answer:option,correctAnswer:q.correct}];onComplete({score:score+xpGained,answers:fa,streak:Math.max(streak,newStreak)});}
          else{setQIndex(i=>i+1);setSelected(null);setAnswered(false);setTimeLeft(15);}
        },2500);
      },[answered,q,timeLeft,streak,lives,score,answers,qIndex,questions]);

      if(!q)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"80vh"}}><div style={{textAlign:"center"}}><div style={{fontSize:56,animation:"rotate 1.5s linear infinite",display:"inline-block"}}>🌍</div><p style={{marginTop:16,color:"#94A3B8",fontSize:18,fontWeight:600}}>Loading Quiz...</p></div></div>;
      const tp=(timeLeft/15)*100,td=timeLeft<=5;
      
      return(
        <div className="app-container quiz-container">
          {xpFloats.map(f=><XPFloat key={f.id} x={f.x} y={f.y} amount={f.amount} onDone={()=>setXpFloats(fs=>fs.filter(x=>x.id!==f.id))}/>)}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <button className="btn-ghost" onClick={onBack} style={{padding:"8px 14px",borderRadius:10,fontSize:14}}>✕ Quit</button>
            <div className="sora" style={{fontSize:16,fontWeight:800,color:"#94A3B8",letterSpacing:"1px"}}>Q {qIndex+1}<span style={{color:"#FCD34D"}}> / {questions.length}</span></div>
            <div style={{display:"flex",gap:6}}>{Array.from({length:3},(_,i)=><span key={i} style={{fontSize:20,opacity:i<lives?1:0.2,transition:"opacity 0.3s"}}>❤️</span>)}</div>
          </div>
          
          <div style={{height:8,background:"rgba(255,255,255,0.06)",borderRadius:4,marginBottom:24,overflow:"hidden",boxShadow:"inset 0 1px 2px rgba(0,0,0,0.3)"}}>
            <div style={{height:"100%",borderRadius:4,background:td?"linear-gradient(90deg,#EF4444,#F97316)":"linear-gradient(90deg,#FCD34D,#F97316)",width:`${tp}%`,transition:"width 1s linear"}}/>
          </div>
          
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:24,gap:12}}>
            <div className="glass" style={{padding:"10px 18px",flex:1,textAlign:"center"}}><span className="sora" style={{fontSize:14,fontWeight:800,color:"#FCD34D"}}>⭐ {score.toLocaleString()}</span></div>
            {streak>=3&&<div className="glass animate-scaleIn" style={{padding:"10px 18px",flex:1,textAlign:"center"}}><span className="sora" style={{fontSize:14,fontWeight:800,color:"#F97316"}}>🔥 ×{streak}</span></div>}
            <div className="glass" style={{padding:"10px 18px",flex:1,textAlign:"center"}}><span style={{fontSize:14,color:"#CBD5E1",fontWeight:600}}>{timeLeft}s</span></div>
          </div>
          
          <div className="glass animate-scaleIn" style={{padding:"32px 24px",marginBottom:24,textAlign:"center",borderRadius:24}} key={qIndex}>
            <p style={{fontSize:20,color:"#F1F5F9",fontWeight:600,marginBottom:q.image?24:0,lineHeight:1.5}}>{q.question}</p>
            {q.image&&<div style={{display:"flex",justifyContent:"center"}}><img src={q.image} alt="flag" style={{width:200,height:133,objectFit:"cover",borderRadius:12,border:"3px solid rgba(255,255,255,0.15)",boxShadow:"0 15px 35px rgba(0,0,0,0.5)"}}/></div>}
          </div>
          
          <div className="options-grid">
            {q.options.map((opt,i)=>{
              let cls="option-card";
              if(answered){
                if(opt===q.correct)cls+=" reveal-correct";
                if(opt===selected&&opt!==q.correct)cls+=" wrong";
                if(opt===selected&&opt===q.correct)cls+=" correct";
                cls+=" disabled";
              }
              return(
                <button key={i} className={cls} onClick={(e)=>handleAnswer(opt,e)} style={{opacity:answered&&opt!==q.correct&&opt!==selected?0.4:1,justifyContent:"space-between"}}>
                  <span>{opt}</span>
                  {answered&&opt===q.correct&&<span style={{fontSize:20}}>✅</span>}
                  {answered&&opt===selected&&opt!==q.correct&&<span style={{fontSize:20}}>❌</span>}
                </button>
              );
            })}
          </div>
          
          {showFact&&q.country&&(
            <div className="glass-bright animate-slideUp" style={{marginTop:24,padding:"20px",borderLeft:"4px solid #FCD34D"}}>
              <div className="sora" style={{fontSize:13,color:"#FCD34D",fontWeight:800,marginBottom:8,letterSpacing:"1px"}}>💡 DID YOU KNOW? · {q.country.name.toUpperCase()}</div>
              <p style={{fontSize:15,color:"#CBD5E1",lineHeight:1.6}}>{q.country.funFact}</p>
            </div>
          )}
        </div>
      );
    }

    // ─── RESULTS SCREEN ───────────────────────────────────────────────────────────

      const grade=pct===100?{icon:"🥇",label:"PERFECT!",color:"#FCD34D"}:pct>=80?{icon:"🎯",label:"SHARP!",color:"#22C55E"}:pct>=60?{icon:"🌟",label:"GOOD!",color:"#4F8EF7"}:{icon:"📚",label:"KEEP LEARNING",color:"#F97316"};

        <div className="app-container" style={{maxWidth:600}}>
          {isPerf&&<Confetti/>}

              <div><div style={{fontSize:42,marginBottom:4}}>{grade.icon}</div><div className="sora" style={{fontSize:28,fontWeight:800,color:grade.color,textShadow:`0 0 20px ${grade.color}40`}}>{pct}%</div></div>
            </ProgressRing>
            <div className="sora" style={{fontSize:28,fontWeight:800,marginTop:24,color:grade.color,letterSpacing:"1px"}}>{grade.label}</div>
            <div style={{color:"#94A3B8",marginTop:8,fontSize:16,fontWeight:500}}>{correct} out of {total} correct</div>
          </div>
          
          <div className="glass animate-fadeInUp" style={{padding:"32px",marginBottom:24,textAlign:"center",animationDelay:"0.1s"}}>
            <div className="sora" style={{fontSize:13,color:"#94A3B8",marginBottom:10,letterSpacing:"2px",fontWeight:800}}>TOTAL SCORE EARNED</div>
            <div className="sora" style={{fontSize:56,fontWeight:800}}><span className="gold-text">{score.toLocaleString()}</span></div>
            <div style={{fontSize:14,color:"#64748B",marginTop:4,fontWeight:600}}>XP Points</div>
            {streak>=3&&<div style={{marginTop:16,padding:"10px 20px",background:"rgba(249,115,22,0.1)",borderRadius:12,display:"inline-block",border:"1px solid rgba(249,115,22,0.2)"}}><span style={{color:"#F97316",fontWeight:700,fontSize:14}}>🔥 Best streak multiplier: {streak}x</span></div>}
          </div>
          
          <div className="animate-fadeInUp grid-3" style={{marginBottom:24,animationDelay:"0.12s"}}>
            <div className="stat-card" style={{padding:"20px"}}><div style={{fontSize:26,color:"#22C55E",fontWeight:800,marginBottom:4}}>{correct}</div><div style={{fontSize:12,color:"#94A3B8",fontWeight:600,textTransform:"uppercase"}}>Correct</div></div>
            <div className="stat-card" style={{padding:"20px"}}><div style={{fontSize:26,color:"#EF4444",fontWeight:800,marginBottom:4}}>{total-correct}</div><div style={{fontSize:12,color:"#94A3B8",fontWeight:600,textTransform:"uppercase"}}>Wrong</div></div>
            <div className="stat-card" style={{padding:"20px"}}><div style={{fontSize:22,color:"#4F8EF7",fontWeight:800,marginBottom:4}}>{difficulty?.toUpperCase()?.[0]||"?"}</div><div style={{fontSize:12,color:"#94A3B8",fontWeight:600,textTransform:"uppercase"}}>Level</div></div>
          </div>
          
          {answers.filter(a=>!a.correct).length>0&&<div className="glass animate-fadeInUp" style={{padding:"24px",marginBottom:32}}>
            <h3 className="sora" style={{fontSize:15,color:"#EF4444",marginBottom:16,fontWeight:800}}>😅 REVIEW THESE MISTAKES</h3>
            {answers.filter(a=>!a.correct).map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:i<answers.filter(x=>!x.correct).length-1?"1px solid rgba(255,255,255,0.06)":"none"}}><img src={FLAG_URL(a.country.id)} alt="" style={{width:28,height:20,objectFit:"cover",borderRadius:4,boxShadow:"0 2px 4px rgba(0,0,0,0.2)"}}/><div style={{flex:1}}><span style={{fontSize:15,fontWeight:600,color:"#F1F5F9"}}>{a.country.name}</span>{a.correctAnswer&&<span style={{fontSize:14,color:"#94A3B8",marginLeft:12,fontWeight:500}}>→ <span style={{color:"#22C55E"}}>{a.correctAnswer}</span></span>}</div></div>)}
          </div>}
          
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <button className="btn-gold" style={{padding:"20px",borderRadius:16,fontSize:18}} onClick={onPlayAgain}>🔄 Play Again</button>
            <button className="btn-ghost" style={{padding:"18px",borderRadius:16,fontSize:16}} onClick={onMenu}>← Back to Menu</button>
          </div>
        </div>
      );
    }

    // ─── LEADERBOARD ──────────────────────────────────────────────────────────────
    const FAKE_PLAYERS=[{rank:1,name:"GeoKing99",country:"US",xp:98420,avatar:"👑"},{rank:2,name:"MapMaestro",country:"GB",xp:87300,avatar:"🗺️"},{rank:3,name:"AtlasWizard",country:"JP",xp:76100,avatar:"⚡"},{rank:4,name:"CapitalPro",country:"DE",xp:65800,avatar:"🏛️"},{rank:5,name:"FlagFanatic",country:"FR",xp:54200,avatar:"🏳️"},{rank:6,name:"BorderBoss",country:"IN",xp:43100,avatar:"🌐"},{rank:7,name:"GlobeTrekker",country:"BR",xp:38400,avatar:"✈️"},{rank:8,name:"QuizQueen",country:"AU",xp:29700,avatar:"👸"},{rank:9,name:"WorldWatcher",country:"CA",xp:21500,avatar:"🔭"},{rank:10,name:"ContinentCzar",country:"ZA",xp:18900,avatar:"🦁"}];
    function LeaderboardScreen({user}){
      const [tab,setTab]=useState("Global");
      const podC=["#FCD34D","#94A3B8","#D97706"],podI=["🥇","🥈","🥉"];
      return(
        <div className="app-container" style={{maxWidth:600}}>
          <h2 className="sora animate-fadeInUp" style={{fontSize:32,fontWeight:800,marginBottom:24}}>🏆 <span className="gold-text">Leaderboard</span></h2>
          <div style={{display:"flex",gap:8,marginBottom:32,background:"rgba(255,255,255,0.03)",padding:"6px",borderRadius:"14px"}}>{["Global","This Week","Today"].map(t=><button key={t} className={`nav-tab ${tab===t?"active":""}`} style={{flex:1}} onClick={()=>setTab(t)}>{t}</button>)}</div>
          
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:32,alignItems:"end"}}>
            {[FAKE_PLAYERS[1],FAKE_PLAYERS[0],FAKE_PLAYERS[2]].map((p,i)=>{
              const ar=i===0?2:i===1?1:3; const col=podC[ar-1]; const ph=ar===1?110:ar===2?85:70;
              return(
                <div key={p.rank} className="animate-fadeInUp" style={{animationDelay:`${i*0.08}s`,textAlign:"center"}}>
                  <div style={{fontSize:36,marginBottom:6,filter:`drop-shadow(0 4px 8px ${col}40)`}}>{p.avatar}</div>
                  <div className="sora" style={{fontSize:14,fontWeight:800,color:col,marginBottom:4}}>{podI[ar-1]}</div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:2,color:"#F1F5F9"}}>{p.name}</div>
                  <div style={{fontSize:12,color:"#94A3B8",fontWeight:600}}>{(p.xp/1000).toFixed(1)}k XP</div>
                  <div style={{height:ph,background:`linear-gradient(to top,${col}15,${col}40)`,border:`1px solid ${col}60`,borderBottom:"none",borderRadius:"12px 12px 0 0",marginTop:12,position:"relative",overflow:"hidden"}}>
                     <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:col,boxShadow:`0 0 10px ${col}`}}></div>
                  </div>
                </div>
              );
            })}
          </div>
          
          <div className="glass" style={{padding:"10px"}}>
            {FAKE_PLAYERS.slice(3).map((p,i)=>(
              <div key={p.rank} className="leaderboard-row animate-fadeInUp" style={{animationDelay:`${(i+3)*0.05}s`}}>
                <div className="sora" style={{fontSize:15,fontWeight:800,color:"#64748B",width:32}}>#{p.rank}</div>
                <div style={{fontSize:24,margin:"0 16px"}}>{p.avatar}</div>
                <div style={{flex:1}}>
                  <div className="sora" style={{fontSize:15,fontWeight:700,color:"#F1F5F9",marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:12,color:"#94A3B8",fontWeight:500}}><img src={FLAG_URL(p.country)} alt="" style={{width:16,height:11,objectFit:"cover",borderRadius:2,marginRight:6,verticalAlign:"middle",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>{p.country}</div>
                </div>
                <div className="sora" style={{fontSize:15,fontWeight:800,color:"#FCD34D"}}>{p.xp.toLocaleString()}</div>
              </div>
            ))}
            <div style={{textAlign:"center",color:"#475569",padding:"12px 0",fontSize:24,letterSpacing:"4px"}}>···</div>
            <div className="leaderboard-row me" style={{borderWidth:"2px",boxShadow:"0 8px 20px rgba(245,200,66,0.15)"}}>
              <div className="sora" style={{fontSize:15,fontWeight:800,color:"#FCD34D",width:32}}>#47</div>
              <div style={{fontSize:24,margin:"0 16px"}}>🌍</div>
              <div style={{flex:1}}>
                <div className="sora" style={{fontSize:15,fontWeight:700,marginBottom:2}}>{user.name} <span style={{fontSize:11,color:"#FCD34D",background:"rgba(245,200,66,0.15)",padding:"2px 6px",borderRadius:"6px",marginLeft:8,verticalAlign:"middle"}}>YOU</span></div>
                <div style={{fontSize:12,color:"#94A3B8",fontWeight:500}}>Keep climbing!</div>
              </div>
              <div className="sora" style={{fontSize:16,fontWeight:800,color:"#FCD34D"}}>{user.xp.toLocaleString()}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── PROFILE ─────────────────────────────────────────────────────────────────
    function ProfileScreen({user}){
      const rank=getRank(user.xp),nextRank=getNextRank(user.xp),xpP=nextRank?((user.xp-rank.min)/(nextRank.min-rank.min))*100:100;
      const BADGES=[{id:"f",icon:"🏳️",name:"Flag Master",desc:"Play 5 quizzes",earned:(user.totalQuizzes||0)>=5},{id:"s",icon:"🔥",name:"Streak Warrior",desc:"Reach a 3-day streak",earned:(user.streak||0)>=3},{id:"p",icon:"🥇",name:"Perfectionist",desc:"Get a perfect score",earned:(user.perfectScores||0)>=1},{id:"m",icon:"🗺️",name:"Map Explorer",desc:"Play Map Quest mode",earned:(user.mapQuestPlayed||0)>=1},{id:"g",icon:"✈️",name:"Globetrotter",desc:"Visit all continents",earned:false},{id:"c",icon:"🏛️",name:"Capital King",desc:"Learn all capitals",earned:false}];
      return(
        <div className="app-container" style={{maxWidth:600}}>
          <div className="glass animate-fadeInUp" style={{padding:"32px 24px",marginBottom:24,textAlign:"center",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:"80px",background:"linear-gradient(180deg, rgba(245,200,66,0.1) 0%, transparent 100%)"}}></div>
            <div style={{width:90,height:90,borderRadius:"50%",background:"linear-gradient(135deg,#FCD34D,#D97706)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,margin:"0 auto 16px",boxShadow:"0 10px 30px rgba(245,200,66,0.4)",border:"4px solid #050810",position:"relative",zIndex:1}}>🌍</div>
            <h2 className="sora" style={{fontSize:28,fontWeight:800,position:"relative",zIndex:1}}>{user.name}</h2>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 18px",borderRadius:20,background:"rgba(245,200,66,0.15)",border:"1px solid rgba(245,200,66,0.4)",marginTop:12,position:"relative",zIndex:1}}>
               <span style={{fontSize:16}}>⭐</span><span className="sora" style={{fontSize:14,fontWeight:800,color:"#FCD34D"}}>Lv.{rank.level} {rank.name}</span>
            </div>
            <div style={{marginTop:24,position:"relative",zIndex:1}}>
               <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94A3B8",marginBottom:8,fontWeight:600}}><span>{user.xp.toLocaleString()} XP</span>{nextRank&&<span>Next: {nextRank.name}</span>}</div>
               <div style={{height:10,background:"rgba(255,255,255,0.08)",borderRadius:5,overflow:"hidden",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.4)"}}><div className="gold-gradient" style={{height:"100%",width:`${xpP}%`,borderRadius:5}}/></div>
            </div>
          </div>
          
          <div className="animate-fadeInUp grid-responsive" style={{marginBottom:32}}>
            {[{label:"Total Quizzes",value:user.totalQuizzes||0,icon:"🎯"},{label:"Countries Mastered",value:user.mastered||0,icon:"🌍"},{label:"Best Streak",value:`${user.streak||0}d`,icon:"🔥"},{label:"Perfect Scores",value:user.perfectScores||0,icon:"🥇"}].map(s=>
              <div key={s.label} className="stat-card" style={{padding:"24px 16px"}}>
                <div style={{fontSize:28,marginBottom:8}}>{s.icon}</div>
                <div className="sora" style={{fontSize:24,fontWeight:800,color:"#FCD34D"}}>{s.value}</div>
                <div style={{fontSize:13,color:"#94A3B8",marginTop:4,fontWeight:500}}>{s.label}</div>
              </div>
            )}
          </div>
          
          <h3 className="sora animate-fadeInUp" style={{fontSize:18,fontWeight:800,marginBottom:16,color:"#F1F5F9"}}>🏅 Achievements</h3>
          <div className="animate-fadeInUp grid-responsive desktop-grid-3">
            {BADGES.map(b=>
              <div key={b.id} className="glass" style={{padding:"20px 16px",textAlign:"center",opacity:b.earned?1:0.5,border:b.earned?"1px solid rgba(245,200,66,0.4)":"1px solid rgba(255,255,255,0.06)",boxShadow:b.earned?"0 8px 25px rgba(245,200,66,0.15)":"none",transition:"all 0.3s"}}>
                 <div style={{fontSize:36,marginBottom:12,filter:b.earned?"drop-shadow(0 4px 10px rgba(0,0,0,0.3))":"grayscale(100%)"}}>{b.icon}</div>
                 <div className="sora" style={{fontSize:14,fontWeight:800,color:b.earned?"#FCD34D":"#94A3B8",marginBottom:6}}>{b.name}</div>
                 <div style={{fontSize:12,color:"#64748B",lineHeight:1.4,fontWeight:500}}>{b.desc}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── ONBOARDING ───────────────────────────────────────────────────────────────
    function OnboardingScreen({onComplete}){
      const [step,setStep]=useState(0);const [name,setName]=useState("");
      const slides=[
        {icon:<div style={{fontSize:100,animation:"float 3s ease-in-out infinite",filter:"drop-shadow(0 10px 20px rgba(0,0,0,0.5))"}}>🌍</div>,title:"Welcome to GeoMaster",subtitle:"How well do you know our world?",action:"Get Started"},
        {icon:<div style={{fontSize:90,filter:"drop-shadow(0 10px 20px rgba(0,0,0,0.5))"}}>🗺️</div>,title:"Quiz Your Geography",subtitle:"Flags, capitals, Map Quest, currencies — master them all across 60 countries.",action:"Next"},
        {icon:null,title:"What's your name, Explorer?",subtitle:"Set up your profile to track progress and compete globally.",isNameStep:true}
      ];
      const slide=slides[step];
      return(
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px",textAlign:"center",position:"relative",overflow:"hidden",zIndex:1}}>
          <div className="animate-scaleIn glass" key={step} style={{position:"relative",zIndex:2,maxWidth:420,width:"100%",padding:"48px 32px",borderRadius:32,boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
            {slide.icon&&<div style={{marginBottom:40}}>{slide.icon}</div>}
            <h1 className="sora" style={{fontSize:36,fontWeight:800,marginBottom:20,lineHeight:1.2}}><span className="gold-text">{slide.title.split(" ").slice(0,1).join(" ")}</span>{" "}{slide.title.split(" ").slice(1).join(" ")}</h1>
            <p style={{fontSize:16,color:"#94A3B8",lineHeight:1.6,marginBottom:48,fontWeight:500}}>{slide.subtitle}</p>
            {slide.isNameStep&&<input type="text" placeholder="Enter your username…" value={name} onChange={e=>setName(e.target.value)} style={{width:"100%",padding:"18px 24px",marginBottom:24,fontSize:18,textAlign:"center"}}/>}
            <button className="btn-gold" style={{width:"100%",padding:"20px",borderRadius:16,fontSize:18}} onClick={()=>{if(step<slides.length-1)setStep(s=>s+1);else onComplete(name||"Explorer");}} disabled={slide.isNameStep&&!name.trim()}>
              {step===slides.length-1?"🚀 Begin Adventure":(slide.action||"Next")}
            </button>
            <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:32}}>
              {slides.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?"#FCD34D":"rgba(255,255,255,0.15)",transition:"all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)"}}/>)}
            </div>
          </div>
        </div>
      );
    }

    // ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
    function BottomNav({active,onNavigate}){
      return(
        <nav className="bottom-nav">
          {[{id:"home",icon:"🏠",label:"Home"},{id:"quiz-mode-select",icon:"🎯",label:"Play"},{id:"leaderboard",icon:"🏆",label:"Ranks"},{id:"profile",icon:"👤",label:"Profile"}].map(item=>(
            <div key={item.id} className={`bnav-item ${active===item.id?"active":""}`} onClick={()=>onNavigate(item.id)}>
              <span className="bnav-icon">{item.icon}</span><span className="bnav-label">{item.label}</span>
            </div>
          ))}
        </nav>
      );
    }

    // ─── ROOT ─────────────────────────────────────────────────────────────────────
    function loadUser(){try{const s=localStorage.getItem("gm_user3");if(s)return JSON.parse(s);}catch{}return null;}
    function saveUser(u){try{localStorage.setItem("gm_user3",JSON.stringify(u));}catch{}}

    function App(){
      const [user,setUser]=useState(null);
      const [screen,setScreen]=useState("onboarding");
      const [quizConfig,setQuizConfig]=useState(null);
      const [mapDiffConfig,setMapDiffConfig]=useState(null);
      const [quizResult,setQuizResult]=useState(null);
      const [lastScreen,setLastScreen]=useState(null);

      useEffect(()=>{const s=loadUser();if(s){setUser(s);setScreen("home");}},[]);

      const updateUser=u=>setUser(prev=>{const next={...prev,...u};saveUser(next);return next;});

      const handleOnboardingComplete=n=>{
        const u={name:n,xp:0,streak:0,totalQuizzes:0,mastered:0,perfectScores:0,mapQuestPlayed:0};
        setUser(u);saveUser(u);setScreen("home");
      };
      const handleStartQuiz=(mode,pool,difficulty)=>{setQuizConfig({mode,pool,difficulty});setLastScreen("quiz");setScreen("quiz");};
      const handleStartMapQuest=cfg=>{setMapDiffConfig(cfg);setLastScreen("mapquest");setScreen("mapquest");};
      
      const handleQuizComplete=result=>{
        const correct=result.answers.filter(a=>a.correct).length,isPerfect=correct===result.answers.length;
        updateUser({xp:(user?.xp||0)+result.score,totalQuizzes:(user?.totalQuizzes||0)+1,mastered:(user?.mastered||0)+correct,perfectScores:(user?.perfectScores||0)+(isPerfect?1:0),streak:Math.max(user?.streak||0,result.streak)});
        setQuizResult(result);setScreen("results");
      };
      
      const handleMapQuestComplete=result=>{
        const correct=result.answers.filter(a=>a.correct).length,isPerfect=correct===result.answers.length;
        updateUser({xp:(user?.xp||0)+result.score,totalQuizzes:(user?.totalQuizzes||0)+1,mastered:(user?.mastered||0)+correct,perfectScores:(user?.perfectScores||0)+(isPerfect?1:0),streak:Math.max(user?.streak||0,result.streak),mapQuestPlayed:(user?.mapQuestPlayed||0)+1});
        setQuizResult(result);setScreen("results");
      };

      const navigate=s=>setScreen(s);
      const hideNav=["quiz","mapquest","onboarding","mapquest-difficulty"].includes(screen);

      if(screen==="onboarding") return(
        <React.Fragment>
          <style>{css}</style>
          <div className="dotgrid-bg" style={{position:"fixed",inset:0,opacity:0.2,pointerEvents:"none"}}></div>
          <div className="ambient-blob blob-1"></div><div className="ambient-blob blob-2"></div>
          <OnboardingScreen onComplete={handleOnboardingComplete}/>
        </React.Fragment>
      );

      return(
        <React.Fragment>
          <style>{css}</style>
          <div className="dotgrid-bg" style={{position:"fixed",inset:0,opacity:0.2,pointerEvents:"none",zIndex:0}}></div>
          <div className="ambient-blob blob-1"></div><div className="ambient-blob blob-2"></div>
          
          <div className={`app-wrapper ${!hideNav ? "has-nav" : ""}`}>
            {screen==="home"&&user&&<HomeScreen user={user} onNavigate={navigate} onPlayNow={()=>navigate("quiz-mode-select")}/>}
            {screen==="quiz-mode-select"&&<QuizModeSelect onBack={()=>navigate("home")} onStartQuiz={handleStartQuiz} onMapQuest={()=>navigate("mapquest-difficulty")}/>}
            {screen==="mapquest-difficulty"&&<MapQuizDifficultyScreen onBack={()=>navigate("quiz-mode-select")} onStart={handleStartMapQuest}/>}
            {screen==="mapquest"&&mapDiffConfig&&<MapQuizScreen diffConfig={mapDiffConfig} onComplete={handleMapQuestComplete} onBack={()=>navigate("mapquest-difficulty")}/>}
            {screen==="quiz"&&quizConfig&&<QuizScreen mode={quizConfig.mode} pool={quizConfig.pool} difficulty={quizConfig.difficulty} onComplete={handleQuizComplete} onBack={()=>navigate("home")}/>}
            {screen==="results"&&quizResult&&(
              <ResultsScreen result={quizResult}
                difficulty={quizConfig?.difficulty||mapDiffConfig?.id}
                onPlayAgain={()=>{ if(lastScreen==="mapquest"){setScreen("mapquest");}else{setScreen("quiz");} }}
                onMenu={()=>{setQuizConfig(null);setMapDiffConfig(null);setLastScreen(null);navigate("home");}}
              />
            )}
            {screen==="leaderboard"&&user&&<LeaderboardScreen user={user}/>}
            {screen==="profile"&&user&&<ProfileScreen user={user}/>}
          </div>
          
          {!hideNav&&<BottomNav active={screen} onNavigate={navigate}/>}
        </React.Fragment>
      );
    }

    // Mount the Application
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
